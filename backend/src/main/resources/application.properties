# Active profile
spring.profiles.active=dev

# App
spring.application.name=kw-ops-erp
server.port=8080

# JWT
jwt.secret=kw-ops-erp-super-secret-jwt-key-minimum-256-bits-long-change-in-production
jwt.expiration=86400000

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging
logging.level.com.kwops=DEBUG
logging.level.org.springframework.security=INFO